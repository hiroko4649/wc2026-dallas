name: Fetch WC2026 Match Results

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch matches from football-data.org
        run: |
          curl -s \
            -H "X-Auth-Token: fe4edac284a34af68c7effc03aafe07b" \
            "https://api.football-data.org/v4/competitions/WC/matches?season=2026" \
            -o matches.json
          echo "Fetched $(python3 -c "import json; d=json.load(open('matches.json')); print(len(d.get('matches',[])))")" matches

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git diff --staged --quiet || git commit -m "Update match results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
